<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>MessengerProject1</title>
</head>

<body>

<div class="main">
    <img src="https://shorturl.at/p9XUX" class="logo" alt="Messenger Logo">

    <div class="nav-link">
        <a href="https://www.messenger.com/privacy">Privacy and Safety</a>
        <a href="https://developers.facebook.com/products/messenger/">For Developers</a>
        <a href="https://www.messenger.com/help">Help Center</a>
    </div>
</div>

<div class="container">

    <div class="login-page">
        <h1>A place for meaningful conversations</h1>

        <span class="welcome">
            Messenger helps you connect with your Facebook friends and family, build your community and deepen your interests.
        </span>

        <form class="info">
            <input type="email" placeholder="Email address or phone number">
            <input type="password" placeholder="Password">

            <div class="both">
                <button type="submit" class="btn">Log In</button>
                <a href="https://www.facebook.com/login/identify/?ctx=recover&from_login_screen=0" class="forgot">
                    Forgotten password?
                </a>
            </div>

            <div class="checkbox">
                <label>
                    <input type="checkbox"> Keep me signed in
                </label>
            </div>
        </form>
    </div>

    <div class="image">
        <img src="https://shorturl.at/mLTdy" alt="Messenger App Preview">
    </div>

</div>

<div class="footer">
    <span>&copy; Meta 2026</span>

    <div class="footer-nav">
        <a href="#">Privacy Policy</a>
        <a href="#">Cookie Policy</a>
        <a href="#">Cookie Settings</a>
        <a href="#">Terms</a>

        <div class="select">
            <select>
                <option selected>English (UK)</option>
                <option>Myanmar (Burma)</option>
            </select>
        </div>
    </div>

    <img src="https://shorturl.at/qAh6E" class="meta-logo" alt="Meta Logo">
</div>

</body>
</html>
